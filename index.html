<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kitchen Spelling Adventure</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Orbitron:wght@700&display=swap');

        /* IPAD & VIEWBOARD OPTIMIZATION */
        * { 
            touch-action: none; 
            -webkit-user-select: none; 
            user-select: none; 
            -webkit-touch-callout: none; 
        }

        body {
            font-family: 'Fredoka One', cursive, sans-serif;
            margin: 0; display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden; background-color: #dfe6e9;
            background-image: radial-gradient(#ced6e0 1px, transparent 1px);
            background-size: 30px 30px;
        }

        #home-page {
            position: fixed; inset: 0; background: #6c5ce7; z-index: 20000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center;
        }
        #home-page h1 { font-size: 4rem; text-shadow: 0 10px 0 #4834d4; margin-bottom: 20px; }
        .start-btn {
            padding: 25px 60px; font-size: 2.5rem; background: #00b894;
            color: white; border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 0 10px 0 #009470; transition: 0.2s;
        }

        #game-container {
            width: 95%; max-width: 900px; height: 96vh;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 40px; margin-top: 10px;
            display: none; flex-direction: column; align-items: center;
            position: relative; border: 8px solid white;
            box-shadow: 0 15px 50px rgba(0,0,0,0.1); z-index: 1;
            background-position: center; background-size: cover;
            transition: background 0.5s ease-in-out;
        }

        header { width: 90%; display: flex; justify-content: space-between; align-items: center; padding: 10px; z-index: 10; }
        #timer { font-size: 1.8rem; background: #ff7675; color: white; padding: 5px 25px; border-radius: 50px; box-shadow: 0 4px 0 #d63031; }
        #round-indicator { font-size: 1.2rem; background: #74b9ff; color: white; padding: 5px 15px; border-radius: 15px; }
        
        #feedback { font-size: 1.8rem; color: #2d3436; height: 40px; z-index: 10; font-weight: bold; }
        #food-display { font-size: 80px; margin: 0; z-index: 10; }
        
        #drop-zone { display: flex; justify-content: center; gap: 8px; margin: 15px 0; min-height: 95px; width: 100%; flex-wrap: wrap; z-index: 10; }
        .slot {
            width: 60px; height: 80px; background: rgba(255, 255, 255, 0.85); border: 4px dashed #b2bec3;
            border-radius: 15px; display: flex; justify-content: center; align-items: center;
        }
        .slot.wrong { background: #ff7675 !important; border-color: #d63031 !important; }

        #letter-area {
            flex-grow: 1; width: 100%; position: relative;
            background-color: rgba(247, 241, 227, 0.5); border-top: 4px solid #dfe6e9; overflow: hidden;
        }

        .letter {
            width: 60px; height: 80px; background: #ffeaa7; border: 4px solid #fdcb6e;
            border-radius: 15px; display: flex; justify-content: center; align-items: center;
            font-size: 2.5rem; color: #2d3436; position: absolute;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2); z-index: 100;
        }

        .is-dragging {
            position: fixed !important; z-index: 99999 !important;
            transform: scale(1.3) !important; pointer-events: none !important;
        }

        .returning { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important; }

        #controls { padding: 15px; display: flex; gap: 15px; z-index: 10; justify-content: center; }
        button {
            font-family: 'Fredoka One', cursive; padding: 12px 25px;
            font-size: 1.1rem; border: none; border-radius: 20px;
            color: white; box-shadow: 0 6px 0 rgba(0,0,0,0.2); cursor: pointer;
        }
        #btn-home-small { background: #e17055; }
        #btn-reveal { background: #0984e3; }
        #btn-next { background: #00b894; display: none; }
    </style>
</head>
<body>

<audio id="success-sound" src="mixkit-alert-bells-echo-765.wav" preload="auto"></audio>

<div id="home-page">
    <h1>Kitchen Spelling</h1>
    <button class="start-btn" onclick="startGame()">START GAME</button>
</div>

<div id="game-container">
    <header>
        <div id="round-indicator">Round 1</div>
        <div id="timer">⏱️ 30</div>
    </header>
    <div id="feedback"></div>
    <div id="food-container" style="text-align: center;">
        <div id="food-display"></div>
    </div>
    <div id="drop-zone"></div>
    <div id="letter-area"></div>
    <div id="controls">
        <button id="btn-home-small" onclick="goHome()">🏠 Home</button>
        <button id="btn-reveal">Reveal Answer</button>
        <button id="btn-next">Next Word ➔</button>
    </div>
</div>

<script>
    const originalWords = [
        { w: 'bread', i: '🍞', bg: 'https://www.kingarthurbaking.com/sites/default/files/2026-02/big-month-of-bread_1.jpg' },
        { w: 'soup', i: '🥣', bg: 'https://www.yummytummyaarthi.com/wp-content/uploads/2021/03/miso-soup-1-500x500.jpg' },
        { w: 'salad', i: '🥗', bg: 'https://cdn.loveandlemons.com/wp-content/uploads/opengraph/2021/04/green-salad-1.jpg' },
        { w: 'lunch', i: '🍱', bg: 'https://static.vecteezy.com/system/resources/thumbnails/078/363/882/small/mbg-indonesian-school-lunchbox-photo.jpg' },
        { w: 'dinner', i: '🍽️', bg: 'https://espressoandlime.com/wp-content/uploads/2023/03/Steak-with-Soy-Butter-Sauce-6-500x500.jpeg' },
        { w: 'chicken', i: '🍗', bg: 'https://assets.epicurious.com/photos/62f16ed5fe4be95d5a460eed/1:1/w_4318,h_4318,c_limit/RoastChicken_RECIPE_080420_37993.jpg' },
        { w: 'noodles', i: '🍜', bg: 'https://playswellwithbutter.com/wp-content/uploads/2025/02/Vegetable-Stir-Fried-Noodles-20.jpg' },
        { w: 'breakfast', i: '🍳', bg: 'https://foodhub.scene7.com/is/image/woolworthsltdprod/english-breakfast-with-beans?wid=1300&hei=1300&fmt=png-alpha&resMode=sharp2&qlt=100' }
    ];

    let currentIndex = 0, timeLeft = 30, timer, letters = [], isGameOver = false, currentSpellingIndex = 0;
    const area = document.getElementById('letter-area'), dropZone = document.getElementById('drop-zone'), container = document.getElementById('game-container');
    const successAudio = document.getElementById('success-sound');

    function startGame() {
        document.getElementById('home-page').style.display = 'none';
        container.style.display = 'flex';
        successAudio.play().then(() => { successAudio.pause(); successAudio.currentTime = 0; }).catch(()=>{});
        initRound();
    }

    function goHome() {
        clearInterval(timer);
        document.getElementById('home-page').style.display = 'flex';
        container.style.display = 'none';
    }

    function initRound() {
        clearInterval(timer); isGameOver = false; timeLeft = 30; letters = []; currentSpellingIndex = 0;
        area.innerHTML = ''; dropZone.innerHTML = ''; document.getElementById('feedback').innerText = '';
        document.getElementById('btn-next').style.display = 'none';
        document.getElementById('btn-reveal').style.display = 'block';
        
        const data = originalWords[currentIndex];
        
        // Dynamic Background Update with faded overlay for readability
        container.style.backgroundImage = `linear-gradient(rgba(255,255,255,0.6), rgba(255,255,255,0.6)), url('${data.bg}')`;

        document.getElementById('food-display').innerText = data.i;
        document.getElementById('round-indicator').innerText = `Word ${currentIndex + 1}`;
        
        for (let i = 0; i < data.w.length; i++) {
            const slot = document.createElement('div'); slot.className = 'slot';
            dropZone.appendChild(slot);
        }

        data.w.split('').sort(() => Math.random() - 0.5).forEach(char => {
            const el = document.createElement('div'); el.className = 'letter'; el.innerText = char;
            const obj = { el, char, x: Math.random()*(area.clientWidth-70), y: Math.random()*(area.clientHeight-90), vx: (Math.random()-0.5)*3, vy: (Math.random()-0.5)*3, isDragging: false, inSlot: false };
            el.addEventListener('pointerdown', (e) => startDrag(e, obj));
            area.appendChild(el); letters.push(obj);
        });

        timer = setInterval(() => {
            timeLeft--; document.getElementById('timer').innerText = `⏱️ ${timeLeft}`;
            if (timeLeft <= 0) endRound(false);
        }, 1000);
        requestAnimationFrame(updatePhysics);
    }

    function updatePhysics() {
        if (isGameOver) return;
        letters.forEach(l => {
            if (l.isDragging || l.inSlot) return;
            l.x += l.vx; l.y += l.vy;
            if (l.x <= 0 || l.x >= area.clientWidth - 65) l.vx *= -1;
            if (l.y <= 0 || l.y >= area.clientHeight - 85) l.vy *= -1;
            l.el.style.left = l.x + 'px'; l.el.style.top = l.y + 'px';
        });
        requestAnimationFrame(updatePhysics);
    }

    let dragObj = null, dragOffset = { x: 0, y: 0 };

    function startDrag(e, obj) {
        if (isGameOver || obj.inSlot) return;
        e.preventDefault();
        dragObj = obj; obj.isDragging = true;
        dragObj.el.setPointerCapture(e.pointerId);

        const rect = dragObj.el.getBoundingClientRect();
        dragOffset.x = e.clientX - rect.left; dragOffset.y = e.clientY - rect.top;
        
        document.body.appendChild(dragObj.el);
        dragObj.el.classList.add('is-dragging');
        
        window.addEventListener('pointermove', onMove);
        window.addEventListener('pointerup', onEnd);
    }

    function onMove(e) {
        if (!dragObj) return;
        dragObj.el.style.left = (e.clientX - dragOffset.x) + 'px';
        dragObj.el.style.top = (e.clientY - dragOffset.y) + 'px';
    }

    function onEnd(e) {
        if (!dragObj) return;
        window.removeEventListener('pointermove', onMove);
        window.removeEventListener('pointerup', onEnd);

        const targetSlot = document.querySelectorAll('.slot')[currentSpellingIndex];
        const r = targetSlot.getBoundingClientRect();
        const isCorrect = (e.clientX > r.left && e.clientX < r.right && e.clientY > r.top && e.clientY < r.bottom && dragObj.char === originalWords[currentIndex].w[currentSpellingIndex]);

        if (isCorrect) {
            targetSlot.appendChild(dragObj.el);
            dragObj.el.className = 'letter'; dragObj.el.style.position = 'relative';
            dragObj.el.style.left = '0'; dragObj.el.style.top = '0'; dragObj.inSlot = true;
            currentSpellingIndex++;
            if (currentSpellingIndex === originalWords[currentIndex].w.length) endRound(true);
        } else {
            dragObj.el.classList.replace('is-dragging', 'returning');
            area.appendChild(dragObj.el);
            dragObj.el.style.left = dragObj.x + 'px'; dragObj.el.style.top = dragObj.y + 'px';
            setTimeout(() => dragObj.el.classList.remove('returning'), 400);
        }
        dragObj.isDragging = false; dragObj = null;
    }

    function endRound(win) {
        isGameOver = true; clearInterval(timer);
        if (win) {
            successAudio.play().catch(()=>{});
            document.getElementById('feedback').innerText = "WELL DONE! ✨";
            document.getElementById('btn-reveal').style.display = 'none';
            document.getElementById('btn-next').style.display = 'block';
        } else {
            document.getElementById('feedback').innerText = "TRY AGAIN! ⏰";
            document.getElementById('btn-next').style.display = 'block';
        }
    }

    document.getElementById('btn-reveal').onclick = () => {
        const data = originalWords[currentIndex];
        const slots = document.querySelectorAll('.slot');
        area.innerHTML = '';
        data.w.split('').forEach((char, i) => {
            slots[i].innerHTML = `<div class="letter" style="position:relative; background:#55efc4; left:0; top:0;">${char}</div>`;
        });
        endRound(true);
    };

    document.getElementById('btn-next').onclick = () => {
        currentIndex = (currentIndex + 1) % originalWords.length;
        initRound();
    };
</script>
</body>
</html>
